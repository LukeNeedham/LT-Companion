name: Build APK

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Comment on PR with APK link
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload.outputs.artifact-url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## APK Build Complete ✅\n\nThe debug APK has been built successfully and is ready to download!\n\n📦 [Download APK](${artifactUrl})`
            });
